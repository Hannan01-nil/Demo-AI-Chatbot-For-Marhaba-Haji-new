services:
  - type: web
    name: marhaba-haji-chatbot
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_URL
        value: https://demo-ai-chatbot-for-marhaba-haji-new.onrender.com
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: marhaba_haji
      - key: GOOGLE_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ADMIN_PHONE
        sync: false
      - key: ADMIN_EMAIL
        sync: false
